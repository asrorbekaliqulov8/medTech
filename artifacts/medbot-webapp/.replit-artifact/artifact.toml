kind = "web"
previewPath = "/"
title = "MedBot Web App"
version = "1.0.0"
id = "artifacts/medbot-webapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20952

[services.development]
run = "pnpm --filter @workspace/medbot-webapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medbot-webapp", "run", "build" ]
publicDir = "artifacts/medbot-webapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20952"
BASE_PATH = "/"
